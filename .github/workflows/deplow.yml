name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # triggers on push to main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js        # remove if not using Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies  # remove if plain HTML
        run: npm install

      - name: Build                 # change to your build command
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist              # your build output folder

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
